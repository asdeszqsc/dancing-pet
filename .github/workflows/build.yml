name: build

# main push 가 유일한 릴리스 경로:
#   tauri.conf.json 의 version 에 해당하는 태그(v<version>)가 없으면
#   빌드 → 태그 생성 → 릴리스 발행 → Homebrew cask bump 까지 자동.
#   이미 릴리스된 버전이면 빌드만 (컴파일 검증 + Rust 캐시 웜업).
on:
  push:
    branches: ["main"]
  workflow_dispatch: # 수동 빌드 (릴리스 발행 없음)

# 릴리스가 중간에 끊기지 않게 취소 대신 직렬화
concurrency:
  group: build-main
  cancel-in-progress: false

jobs:
  # 릴리스 여부 판단: push 이벤트 + v<version> 태그가 아직 없을 때만 발행
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      release: ${{ steps.v.outputs.release }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          V="$(jq -r .version tauri/src-tauri/tauri.conf.json)"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ] && \
             ! git ls-remote --exit-code --tags origin "v$V" > /dev/null 2>&1; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            rust_targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install frontend deps
        working-directory: tauri
        run: npm ci

      - name: Build app (tauri-action)
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 업데이트 아티팩트 서명 (자동 업데이트용)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          # 새 버전이면 태그 v<version> 생성 + 릴리스 발행(초안 아님), 아니면 빌드만
          tagName: ${{ needs.version.outputs.release == 'true' && format('v{0}', needs.version.outputs.version) || '' }}
          releaseName: ${{ needs.version.outputs.release == 'true' && format('DancingPet v{0}', needs.version.outputs.version) || '' }}
          releaseDraft: false
          args: ${{ matrix.args }}

      # ad-hoc 서명의 designated requirement 가 identifier 고정형인지 검증
      # (깨지면 brew upgrade 마다 손쉬운 사용 권한이 무효화됨 — scripts/macos-adhoc-sign.sh)
      - name: Verify macOS signature (stable TCC identity)
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail
          EXE="tauri/src-tauri/target/universal-apple-darwin/release/bundle/macos/DancingPet.app/Contents/MacOS/tauri"
          codesign -d -r- "$EXE" 2>&1 | tee /dev/stderr | \
            grep -qF 'designated => identifier "com.dancingpet.app"'
          # 번들 통째 서명이 아니라(리소스 seal 없음) 번들 컨텍스트 --verify 는 항상
          # 실패한다 — 바이너리를 밖으로 복사해 단독 Mach-O 로 서명·요구사항 검증.
          cp "$EXE" "$RUNNER_TEMP/dancingpet-exe"
          codesign --verify \
            --test-requirement='=identifier "com.dancingpet.app"' \
            "$RUNNER_TEMP/dancingpet-exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dancingpet-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            tauri/src-tauri/target/**/release/bundle/**/*.dmg
            tauri/src-tauri/target/**/release/bundle/**/*.app
            tauri/src-tauri/target/**/release/bundle/**/*.msi
            tauri/src-tauri/target/**/release/bundle/**/*-setup.exe

  # 릴리스 발행 후 Homebrew tap(asdeszqsc/homebrew-tap) cask 를 새 버전으로
  # 자동 갱신 → macOS 유저는 `brew upgrade --cask dancing-pet` 로 업데이트.
  # TAP_GITHUB_TOKEN: homebrew-tap 에 push 가능한 토큰 (기본 GITHUB_TOKEN 은 이 repo 전용)
  brew:
    if: needs.version.outputs.release == 'true'
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Bump cask version/sha256
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          DMG="DancingPet_${VERSION}_universal.dmg"
          curl -fsSL -o "$DMG" \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${DMG}"
          SHA="$(sha256sum "$DMG" | cut -d' ' -f1)"
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/asdeszqsc/homebrew-tap.git" tap
          cd tap
          sed -i -E "s|^  version \".*\"|  version \"${VERSION}\"|" Casks/dancing-pet.rb
          sed -i -E "s|^  sha256 \".*\"|  sha256 \"${SHA}\"|" Casks/dancing-pet.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "dancing-pet ${VERSION}"
          git push
