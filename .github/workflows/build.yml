name: build

on:
  push:
    tags: ["v*"]
    # main push 는 컴파일 검증 + Rust 캐시 웜업 (릴리스 발행은 태그일 때만).
    # GitHub 캐시는 "자기 ref + 기본 브랜치" 것만 복원 가능 → 태그 릴리스 빌드가
    # 빨라지려면 main 에 캐시가 있어야 한다.
    branches: ["main"]
  workflow_dispatch:

# 같은 브랜치의 연속 push 는 이전 빌드 취소 (태그/릴리스 런은 취소 안 함)
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            rust_targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri
          # 태그 ref 에 저장된 캐시는 이후 어떤 런도 복원 못 하므로 저장 생략
          save-if: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Install frontend deps
        working-directory: tauri
        run: npm ci

      - name: Build app (tauri-action)
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 업데이트 아티팩트 서명 (자동 업데이트용)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          # 태그 푸시면 릴리스 자동 발행(초안 아님) → updater 의 releases/latest 가 동작
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "DancingPet ${{ github.ref_name }}"
          releaseDraft: false
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dancingpet-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            tauri/src-tauri/target/**/release/bundle/**/*.dmg
            tauri/src-tauri/target/**/release/bundle/**/*.app
            tauri/src-tauri/target/**/release/bundle/**/*.msi
            tauri/src-tauri/target/**/release/bundle/**/*-setup.exe
