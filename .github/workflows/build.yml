name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            rust_targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install frontend deps
        working-directory: tauri
        run: npm ci

      - name: Build app (tauri-action)
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 업데이트 아티팩트 서명 (자동 업데이트용)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          # 태그 푸시면 릴리스 자동 발행(초안 아님) → updater 의 releases/latest 가 동작
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "DancingPet ${{ github.ref_name }}"
          releaseDraft: false
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dancingpet-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            tauri/src-tauri/target/**/release/bundle/**/*.dmg
            tauri/src-tauri/target/**/release/bundle/**/*.app
            tauri/src-tauri/target/**/release/bundle/**/*.msi
            tauri/src-tauri/target/**/release/bundle/**/*-setup.exe
